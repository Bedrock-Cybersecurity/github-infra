name: Terraform Deploy - github-infra

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
  pull_request:
    paths:
      - "**.tf"
  workflow_dispatch:

# Serialize all runs against the shared state. cancel-in-progress=false: never
# kill an apply mid-flight (risks partial state / stale lock) — queue instead.
concurrency:
  group: terraform-deploy-bedrock-github-infra
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # CI role (206820231356) cross-account assumes into 863609217450 for S3 state.
      # PREREQUISITE: add repo:Bedrock-Cybersecurity/github-infra:* to the
      # github-deploy-main trust policy in aws-infra before first run.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::206820231356:role/github-deploy-main
          aws-region: us-west-2

      # Org-admin GitHub App token for the Bedrock-Cybersecurity org. Store at
      # cirius/github-infra/terraform-token in AWS Secrets Manager (same token
      # used by Cirius-Group-Inc/github-infra — it has admin on both orgs).
      - name: Load GitHub token
        run: |
          TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id cirius/github-infra/terraform-token \
            --query SecretString --output text)
          echo "::add-mask::$TOKEN"
          echo "GITHUB_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.10.3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: terraform plan -input=false -no-color

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: terraform apply -auto-approve -input=false -no-color
